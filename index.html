<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Espaço</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0A413B; --sidebar:#083530; --surface:#0d4e47; --surface2:#0f5a52;
      --border:rgba(255,255,255,0.10); --text:#fff; --text2:rgba(255,255,255,.60);
      --text3:rgba(255,255,255,.35); --accent:#fff; --acc-text:#0A413B;
      --input-bg:rgba(255,255,255,0.07);
      --font:'Söhne',ui-sans-serif,system-ui,-apple-system,sans-serif;
    }
    body { font-family:var(--font); background:var(--bg); color:var(--text); height:100dvh; display:flex; overflow:hidden; }
    #app { display:flex; width:100%; height:100dvh; }
    #sidebar { width:228px; background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition:width .2s; overflow:hidden; }
    #sidebar.closed { width:0; }
    #main { flex:1; display:flex; flex-direction:column; min-width:0; }
    #brand { padding:14px 14px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    #brand-icon { width:28px; height:28px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--acc-text); flex-shrink:0; }
    #brand-name { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #search-wrap { padding:10px 12px 6px; position:relative; }
    #search-wrap::before { content:'⌕'; position:absolute; left:22px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:14px; pointer-events:none; }
    #search { width:100%; font-size:13px; padding:7px 10px 7px 28px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); outline:none; font-family:var(--font); }
    #home-btn { margin:2px 8px 4px; padding:7px 9px; border-radius:8px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px; }
    #home-btn:hover, #home-btn.active { background:rgba(255,255,255,0.12); }
    #block-list { flex:1; overflow-y:auto; padding:0 8px; }
    .list-label { font-size:10px; color:var(--text3); padding:8px 8px 3px; text-transform:uppercase; letter-spacing:.08em; font-weight:500; }
    .block-row { display:flex; align-items:center; gap:5px; padding:7px 9px; border-radius:8px; cursor:pointer; margin-bottom:1px; font-size:13px; transition:background .1s; }
    .block-row:hover { background:rgba(255,255,255,0.07); }
    .block-row.active { background:rgba(255,255,255,0.15); font-weight:500; }
    .block-row.dragover { background:var(--surface2); }
    .drag-handle { font-size:11px; color:var(--text3); cursor:grab; letter-spacing:-1px; flex-shrink:0; }
    .block-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .block-count { font-size:11px; color:var(--text3); flex-shrink:0; }
    .pin-btn,.del-btn { background:none; border:none; cursor:pointer; font-size:11px; flex-shrink:0; opacity:.25; color:var(--text); transition:opacity .15s; }
    .pin-btn.pinned,.block-row:hover .pin-btn,.block-row:hover .del-btn { opacity:1; }
    .del-btn { font-size:15px; }
    .block-name-input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:13px; font-family:var(--font); min-width:0; }
    #add-block-btn { margin:10px; padding:8px; font-size:13px; background:none; border:1px dashed rgba(255,255,255,0.2); border-radius:8px; cursor:pointer; color:var(--text2); font-family:var(--font); width:calc(100% - 20px); transition:border-color .15s,color .15s; }
    #add-block-btn:hover { border-color:rgba(255,255,255,0.5); color:var(--text); }
    #topbar { display:flex; align-items:center; gap:10px; padding:11px 18px; border-bottom:1px solid var(--border); background:var(--sidebar); flex-shrink:0; }
    #toggle-btn { background:none; border:none; cursor:pointer; color:var(--text2); font-size:17px; padding:3px 5px; border-radius:6px; }
    #topbar-title { font-size:15px; font-weight:500; flex:1; cursor:default; }
    #sync-status { font-size:11px; color:var(--text3); padding:4px 18px; text-align:right; flex-shrink:0; }
    #home { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; gap:32px; overflow-y:auto; }
    #home-title { font-size:36px; font-weight:600; letter-spacing:-.5px; cursor:text; border:none; background:transparent; color:var(--text); text-align:center; font-family:var(--font); outline:none; border-bottom:2px solid transparent; }
    #home-title:focus { border-bottom-color:rgba(255,255,255,0.3); }
    #home-sub { font-size:14px; color:var(--text2); margin-top:8px; text-align:center; }
    #block-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; width:100%; max-width:480px; }
    .block-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 16px; cursor:pointer; transition:background .15s,transform .1s; }
    .block-card:hover { background:var(--surface2); transform:translateY(-2px); }
    .block-card-name { font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:4px; }
    .block-card-count { font-size:11px; color:var(--text3); }
    .block-card-add { background:transparent; border:1px dashed rgba(255,255,255,0.2); border-radius:12px; padding:18px 16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--text2); transition:border-color .15s; }
    .block-card-add:hover { border-color:rgba(255,255,255,0.5); color:var(--text); }
    #chat { flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:14px; }
    #chat-empty { color:var(--text3); font-size:14px; margin:auto; text-align:center; line-height:2; }
    .entry { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .bubble { max-width:75%; background:var(--surface); border:1px solid var(--border); border-radius:14px 14px 4px 14px; padding:11px 15px 8px; font-size:14px; line-height:1.7; word-break:break-word; white-space:pre-wrap; }
    .bubble-actions { display:flex; gap:10px; margin-top:6px; justify-content:flex-end; }
    .bubble-btn { background:none; border:none; cursor:pointer; font-size:12px; color:var(--text3); }
    .entry-ts { font-size:11px; color:var(--text3); padding-right:4px; }
    .edit-box { width:75%; display:flex; flex-direction:column; gap:7px; }
    .edit-textarea { width:100%; font-size:14px; padding:11px 15px; border-radius:14px 14px 4px 14px; border:1px solid rgba(255,255,255,0.3); background:var(--surface); color:var(--text); outline:none; resize:vertical; line-height:1.6; font-family:var(--font); }
    .edit-actions { display:flex; gap:6px; justify-content:flex-end; }
    .btn-cancel { font-size:12px; padding:4px 14px; border-radius:6px; border:1px solid var(--border); background:none; cursor:pointer; color:var(--text2); font-family:var(--font); }
    .btn-save { font-size:12px; padding:4px 14px; border-radius:6px; border:none; background:var(--accent); color:var(--acc-text); cursor:pointer; font-family:var(--font); font-weight:500; }
    #input-area { padding:12px 18px 16px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; background:var(--sidebar); }
    #note-input { flex:1; font-size:14px; padding:10px 15px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); outline:none; resize:none; line-height:1.6; font-family:var(--font); }
    #send-btn { background:var(--accent); color:var(--acc-text); border:none; border-radius:10px; padding:0 18px; font-size:20px; cursor:pointer; flex-shrink:0; font-weight:700; }
    #send-btn:hover { background:#f0f0f0; }
    .result-card { padding:8px 10px; border-radius:8px; cursor:pointer; margin-bottom:4px; background:var(--surface); border:1px solid var(--border); }
    .result-block { font-size:10px; color:rgba(255,255,255,0.5); margin-bottom:2px; text-transform:uppercase; letter-spacing:.06em; }
    .result-text { font-size:13px; line-height:1.5; word-break:break-word; }
    mark { background:rgba(255,255,255,0.25); color:#fff; border-radius:2px; padding:0 2px; }
    @media (max-width:600px) {
      #sidebar { width:200px; } #chat { padding:16px; }
      #input-area { padding:10px 12px 14px; } #home { padding:24px 16px; }
      #home-title { font-size:26px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="brand">
      <div id="brand-icon">M</div>
      <div id="brand-name">Meu Espaço</div>
    </div>
    <div id="search-wrap">
      <input id="search" placeholder="Buscar em tudo..." oninput="onSearch(this.value)" />
    </div>
    <div id="home-btn" onclick="goHome()">🏠 Início</div>
    <div id="block-list"></div>
    <button id="add-block-btn" onclick="addBlock()">+ Novo bloco de notas</button>
  </div>
  <div id="main">
    <div id="topbar">
      <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
      <div id="topbar-title">Início</div>
    </div>
    <div id="sync-status">Conectando...</div>
    <div id="content" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden"></div>
  </div>
</div>

<!-- Firebase SDKs via compat (no module needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyAejnoowXpV_gt8-wE6XORtufWOwyy6HDg",
  authDomain:        "secondbrain-b9928.firebaseapp.com",
  projectId:         "secondbrain-b9928",
  storageBucket:     "secondbrain-b9928.firebasestorage.app",
  messagingSenderId: "124773998398",
  appId:             "1:124773998398:web:e3ee36dcb70ac44e44166f"
});
const db = firebase.firestore();
const metaRef   = db.collection("app").doc("meta");
const blocksCol = db.collection("blocks");

// ── State ──
var state       = { title: "Meu Espaço", activeId: null, blocks: [] };
var sidebarOpen = true;
var searchQuery = "";
var dragSrcId   = null;
var clickTimer  = null;
var unsubMap    = {};

function uid() { return Math.random().toString(36).slice(2,9); }
function setStatus(m) { var el=document.getElementById("sync-status"); if(el) el.textContent=m; }
function sorted() { return state.blocks.filter(function(b){return b.pinned}).concat(state.blocks.filter(function(b){return !b.pinned})); }

// ── Bootstrap ──
function bootstrap() {
  metaRef.get().then(function(snap) {
    if (snap.exists) { state.title = snap.data().title || "Meu Espaço"; }
    else { metaRef.set({ title: "Meu Espaço" }); }
  });

  blocksCol.orderBy("order").onSnapshot(function(snap) {
    if (snap.empty) {
      ["Ideias gerais","Clientes","Projetos"].forEach(function(name, i) {
        blocksCol.add({ name: name, pinned: false, order: i });
      });
      return;
    }
    var prevIds = state.blocks.map(function(b){ return b.id; });
    state.blocks = snap.docs.map(function(d) {
      var existing = state.blocks.find(function(b){ return b.id === d.id; });
      return Object.assign({ entries: [] }, existing || {}, { id: d.id }, d.data());
    });
    state.blocks.forEach(function(b) {
      if (!unsubMap[b.id]) subscribeEntries(b.id);
    });
    prevIds.forEach(function(id) {
      if (!state.blocks.find(function(b){ return b.id===id; }) && unsubMap[id]) {
        unsubMap[id](); delete unsubMap[id];
      }
    });
    setStatus("Sincronizado ✓");
    render();
  });
}

function subscribeEntries(blockId) {
  unsubMap[blockId] = db.collection("blocks").doc(blockId).collection("entries")
    .orderBy("createdAt").onSnapshot(function(snap) {
      var b = state.blocks.find(function(x){ return x.id===blockId; });
      if (!b) return;
      b.entries = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
      if (state.activeId === blockId) renderContent();
      renderSidebar();
    });
}

// ── Sidebar ──
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("closed", !sidebarOpen);
}

function onSearch(v) { searchQuery = v; renderSidebar(); }

function renderSidebar() {
  var list = document.getElementById("block-list");
  document.getElementById("brand-name").textContent = state.title;
  document.getElementById("home-btn").classList.toggle("active", !state.activeId);
  list.innerHTML = "";

  if (searchQuery.trim().length > 1) {
    var q = searchQuery.toLowerCase();
    var results = [];
    state.blocks.forEach(function(b) {
      (b.entries||[]).forEach(function(e) {
        if (typeof e.text==="string" && e.text.toLowerCase().indexOf(q) !== -1) {
          results.push({ blockName: b.name, blockId: b.id, entry: e });
        }
      });
    });
    var label = document.createElement("div");
    label.className = "list-label";
    label.textContent = results.length + " resultado" + (results.length!==1?"s":"");
    list.appendChild(label);
    if (!results.length) {
      var msg = document.createElement("div");
      msg.style.cssText = "font-size:13px;color:var(--text2);padding:8px 6px";
      msg.textContent = "Nenhum resultado.";
      list.appendChild(msg);
    } else {
      results.forEach(function(r) {
        var d = document.createElement("div");
        d.className = "result-card";
        d.innerHTML = '<div class="result-block">'+escHtml(r.blockName)+'</div><div class="result-text">'+hilite(r.entry.text.slice(0,80)+(r.entry.text.length>80?"…":""), searchQuery)+'</div>';
        d.onclick = function() { state.activeId = r.blockId; searchQuery = ""; document.getElementById("search").value = ""; render(); };
        list.appendChild(d);
      });
    }
    return;
  }

  var bs = sorted();
  var hasPinned = bs.some(function(b){ return b.pinned; });
  var shownPin=false, shownBlock=false;
  bs.forEach(function(b) {
    if (b.pinned && !shownPin)           { addLabel(list,"Fixados");  shownPin=true; }
    if (!b.pinned && hasPinned && !shownBlock) { addLabel(list,"Blocos"); shownBlock=true; }
    var row = document.createElement("div");
    row.className = "block-row" + (state.activeId===b.id?" active":"");
    row.dataset.id = b.id;
    row.draggable = !b.pinned;
    row.innerHTML =
      (!b.pinned ? '<span class="drag-handle">⠿</span>' : '') +
      '<span class="block-name">'+escHtml(b.name)+'</span>'+
      '<span class="block-count">'+((b.entries||[]).length)+'</span>'+
      '<button class="pin-btn'+(b.pinned?" pinned":"")+'">📌</button>'+
      (state.blocks.length>1 ? '<button class="del-btn">×</button>' : '');

    row.querySelector(".block-name").ondblclick = function(e) {
      e.stopPropagation(); clearTimeout(clickTimer); startRenameBlock(b.id);
    };
    row.querySelector(".pin-btn").onclick = function(e) {
      e.stopPropagation();
      db.collection("blocks").doc(b.id).update({ pinned: !b.pinned });
    };
    var delBtn = row.querySelector(".del-btn");
    if (delBtn) delBtn.onclick = function(e) {
      e.stopPropagation();
      if (state.blocks.length<=1) return;
      db.collection("blocks").doc(b.id).delete();
      if (state.activeId===b.id) { state.activeId=null; render(); }
    };
    row.onclick = function() {
      clickTimer = setTimeout(function() { state.activeId=b.id; render(); }, 220);
    };
    if (!b.pinned) {
      row.ondragstart = function() { dragSrcId=b.id; setTimeout(function(){ row.style.opacity=".3"; },0); };
      row.ondragend   = function() { row.style.opacity="1"; dragSrcId=null; };
      row.ondragover  = function(e) { e.preventDefault(); row.classList.add("dragover"); };
      row.ondragleave = function() { row.classList.remove("dragover"); };
      row.ondrop      = function() {
        row.classList.remove("dragover");
        if (!dragSrcId || dragSrcId===b.id) return;
        var src = state.blocks.find(function(x){ return x.id===dragSrcId; });
        if (!src || src.pinned) return;
        var si = state.blocks.findIndex(function(x){ return x.id===dragSrcId; });
        var ti = state.blocks.findIndex(function(x){ return x.id===b.id; });
        state.blocks.splice(si,1); state.blocks.splice(ti,0,src);
        state.blocks.forEach(function(bl,i) {
          db.collection("blocks").doc(bl.id).update({ order: i });
        });
        renderSidebar();
      };
    }
    list.appendChild(row);
  });
}

function addLabel(parent, txt) {
  var d = document.createElement("div"); d.className="list-label"; d.textContent=txt; parent.appendChild(d);
}

function startRenameBlock(id) {
  var row = document.querySelector('.block-row[data-id="'+id+'"]');
  if (!row) return;
  var nameEl = row.querySelector(".block-name");
  var b = state.blocks.find(function(x){ return x.id===id; });
  var inp = document.createElement("input");
  inp.className="block-name-input"; inp.value=b.name;
  nameEl.replaceWith(inp); inp.focus(); inp.select();
  function done() {
    var val = inp.value.trim() || b.name;
    db.collection("blocks").doc(id).update({ name: val });
  }
  inp.onblur = done;
  inp.onkeydown = function(e) { if(e.key==="Enter") inp.blur(); e.stopPropagation(); };
  inp.onclick = function(e) { e.stopPropagation(); };
}

function addBlock() {
  var order = state.blocks.length;
  blocksCol.add({ name:"Novo bloco de notas", pinned:false, order:order }).then(function(ref) {
    state.activeId = ref.id;
    render();
    setTimeout(function() { startRenameBlock(ref.id); }, 300);
  });
}

function goHome() { state.activeId=null; render(); }

// ── Topbar ──
function renderTopbar() {
  var b = state.blocks.find(function(x){ return x.id===state.activeId; });
  var titleEl = document.getElementById("topbar-title");
  if (b) {
    titleEl.textContent = (b.pinned?"📌 ":"")+b.name;
    titleEl.title = "Duplo clique para renomear";
    titleEl.ondblclick = function() { clearTimeout(clickTimer); startRenameBlock(b.id); };
  } else {
    titleEl.textContent = "Início";
    titleEl.title = "Duplo clique para editar";
    titleEl.ondblclick = function() {
      var inp = document.createElement("input");
      inp.value = state.title;
      inp.style.cssText = "background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.4);outline:none;color:var(--text);font-size:15px;font-weight:500;font-family:var(--font);width:220px";
      titleEl.replaceWith(inp); inp.focus();
      function done() {
        state.title = inp.value.trim() || state.title;
        metaRef.set({ title: state.title });
        inp.replaceWith(titleEl);
        titleEl.textContent = state.title;
        renderSidebar();
      }
      inp.onblur = done;
      inp.onkeydown = function(e) { if(e.key==="Enter") inp.blur(); };
    };
  }
}

// ── Content ──
function render() { renderSidebar(); renderTopbar(); renderContent(); }

function renderContent() {
  var c = document.getElementById("content");
  c.innerHTML = "";
  if (!state.activeId) { renderHome(c); return; }
  var b = state.blocks.find(function(x){ return x.id===state.activeId; });
  if (!b) { state.activeId=null; renderHome(c); return; }
  renderChat(c, b);
}

function renderHome(c) {
  var div = document.createElement("div"); div.id="home";
  div.innerHTML =
    '<div style="text-align:center">'+
      '<input id="home-title" value="'+escHtml(state.title)+'" placeholder="Meu Espaço" />'+
      '<div id="home-sub">Duplo clique no título para editar · Selecione um bloco para começar</div>'+
    '</div>'+
    '<div id="block-grid"></div>';
  c.appendChild(div);
  var ti = document.getElementById("home-title");
  ti.onblur = function() { state.title=ti.value.trim()||state.title; metaRef.set({title:state.title}); renderSidebar(); };
  ti.onkeydown = function(e) { if(e.key==="Enter") ti.blur(); };
  var grid = document.getElementById("block-grid");
  sorted().forEach(function(b) {
    var card = document.createElement("div"); card.className="block-card";
    card.innerHTML='<div class="block-card-name">'+(b.pinned?"📌 ":"")+escHtml(b.name)+'</div><div class="block-card-count">'+((b.entries||[]).length)+' nota'+((b.entries||[]).length!==1?"s":"")+'</div>';
    card.onclick = function() { state.activeId=b.id; render(); };
    grid.appendChild(card);
  });
  var addCard = document.createElement("div"); addCard.className="block-card-add";
  addCard.textContent="+ Novo bloco de notas";
  addCard.onclick = addBlock;
  grid.appendChild(addCard);
}

function renderChat(c, b) {
  var chat = document.createElement("div"); chat.id="chat";
  if (!(b.entries||[]).length) {
    chat.innerHTML='<div id="chat-empty">Bloco vazio.<br>Escreva sua primeira anotação abaixo.</div>';
  } else {
    b.entries.forEach(function(e){ renderEntry(chat, b, e); });
  }
  var anchor = document.createElement("div"); chat.appendChild(anchor);
  c.appendChild(chat);
  anchor.scrollIntoView();
  var ia = document.createElement("div"); ia.id="input-area";
  ia.innerHTML='<textarea id="note-input" rows="2" placeholder="Escreva sua anotação... (Enter para salvar, Shift+Enter para nova linha)"></textarea><button id="send-btn" onclick="sendNote()">↑</button>';
  c.appendChild(ia);
  var inp = document.getElementById("note-input");
  inp.onkeydown = function(ev) { if(ev.key==="Enter"&&!ev.shiftKey){ ev.preventDefault(); sendNote(); } };
  setTimeout(function(){ inp.focus(); }, 100);
}

function renderEntry(chat, b, e) {
  var wrap = document.createElement("div"); wrap.className="entry"; wrap.id="entry-"+e.id;
  wrap.innerHTML=
    '<div class="bubble">'+
      '<div>'+escHtml(e.text)+'</div>'+
      '<div class="bubble-actions">'+
        '<button class="bubble-btn" onclick="startEditEntry(\''+b.id+'\',\''+e.id+'\')">✏️</button>'+
        '<button class="bubble-btn" onclick="deleteEntry(\''+b.id+'\',\''+e.id+'\')">🗑️</button>'+
      '</div>'+
    '</div>'+
    '<div class="entry-ts">'+(e.ts||"")+(e.edited?" · editado":"")+'</div>';
  chat.appendChild(wrap);
}

function sendNote() {
  var inp = document.getElementById("note-input");
  var txt = inp && inp.value.trim();
  if (!txt || !state.activeId) return;
  inp.value = ""; setStatus("Salvando...");
  db.collection("blocks").doc(state.activeId).collection("entries").add({
    text: txt, ts: new Date().toLocaleString("pt-BR"), edited: false, createdAt: Date.now()
  }).then(function(){ setStatus("Sincronizado ✓"); });
  inp.focus();
}

function deleteEntry(blockId, entryId) {
  db.collection("blocks").doc(blockId).collection("entries").doc(entryId).delete();
}

function startEditEntry(blockId, entryId) {
  var b = state.blocks.find(function(x){ return x.id===blockId; });
  var e = b && b.entries && b.entries.find(function(x){ return x.id===entryId; });
  var wrap = document.getElementById("entry-"+entryId);
  if (!e||!wrap) return;
  wrap.innerHTML=
    '<div class="edit-box">'+
      '<textarea class="edit-textarea" rows="3">'+escHtml(e.text)+'</textarea>'+
      '<div class="edit-actions">'+
        '<button class="btn-cancel" onclick="cancelEdit(\''+blockId+'\',\''+entryId+'\')">Cancelar</button>'+
        '<button class="btn-save" onclick="saveEdit(\''+blockId+'\',\''+entryId+'\')">Salvar</button>'+
      '</div>'+
    '</div>'+
    '<div class="entry-ts">'+(e.ts||"")+(e.edited?" · editado":"")+'</div>';
  wrap.querySelector("textarea").focus();
}

function cancelEdit(blockId, entryId) {
  var b = state.blocks.find(function(x){ return x.id===blockId; });
  var e = b && b.entries && b.entries.find(function(x){ return x.id===entryId; });
  var wrap = document.getElementById("entry-"+entryId);
  if (!e||!wrap) return;
  wrap.innerHTML=
    '<div class="bubble"><div>'+escHtml(e.text)+'</div>'+
    '<div class="bubble-actions">'+
      '<button class="bubble-btn" onclick="startEditEntry(\''+b.id+'\',\''+e.id+'\')">✏️</button>'+
      '<button class="bubble-btn" onclick="deleteEntry(\''+b.id+'\',\''+e.id+'\')">🗑️</button>'+
    '</div></div>'+
    '<div class="entry-ts">'+(e.ts||"")+(e.edited?" · editado":"")+'</div>';
}

function saveEdit(blockId, entryId) {
  var wrap = document.getElementById("entry-"+entryId);
  var txt = wrap && wrap.querySelector("textarea") && wrap.querySelector("textarea").value.trim();
  if (!txt) return;
  setStatus("Salvando...");
  db.collection("blocks").doc(blockId).collection("entries").doc(entryId)
    .update({ text: txt, edited: true })
    .then(function(){ setStatus("Sincronizado ✓"); });
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function hilite(text, q) {
  if (!q) return escHtml(text);
  var idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx===-1) return escHtml(text);
  return escHtml(text.slice(0,idx))+'<mark>'+escHtml(text.slice(idx,idx+q.length))+'</mark>'+escHtml(text.slice(idx+q.length));
}

bootstrap();
</script>
</body>
</html>
