<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matheus</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230A413B'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='20' font-weight='700' fill='white'>M</text></svg>"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0A413B;--sidebar:#083530;--surface:#0d4e47;--surface2:#0f5a52;--border:rgba(255,255,255,.10);--text:#fff;--text2:rgba(255,255,255,.60);--text3:rgba(255,255,255,.35);--accent:#fff;--acc-text:#0A413B;--input-bg:rgba(255,255,255,.07);--font:'Söhne',ui-sans-serif,system-ui,-apple-system,sans-serif;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden}
    #app{display:flex;width:100%;height:100dvh}
    /* Lock */
    #lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:9999}
    #lock-screen.hidden{display:none}
    #lock-icon{width:56px;height:56px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px}
    #lock-title{font-size:22px;font-weight:600}
    #lock-subtitle{font-size:13px;color:var(--text2)}
    #pin-dots{display:flex;gap:12px}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:background .15s,border-color .15s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    #pin-error{font-size:13px;color:#f87171;min-height:18px}
    #pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
    .pin-key{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--text);font-size:20px;font-weight:500;cursor:pointer;transition:background .15s}
    .pin-key:hover{background:rgba(255,255,255,.12)}
    .pin-key.del{font-size:16px}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    /* Sidebar */
    #sidebar{width:228px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;position:relative;min-width:48px;max-width:480px}
    #sidebar.mini{width:48px!important}
    #sidebar.mini #search-wrap,#sidebar.mini #block-list,#sidebar.mini #add-block-btn,#sidebar.mini #export-btn,#sidebar.mini .brand-name,#sidebar.mini #home-label{display:none}
    #sidebar.mini #brand{justify-content:center;padding:14px 0}
    #sidebar.mini #home-btn{justify-content:center;padding:8px 0}
    #resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;background:transparent;transition:background .15s}
    #resize-handle:hover,#resize-handle.dragging{background:rgba(255,255,255,.15)}
    #brand{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    #brand-icon{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--acc-text);flex-shrink:0}
    .brand-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #search-wrap{padding:10px 12px 6px;position:relative}
    #search-wrap::before{content:'⌕';position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
    #search{width:100%;font-size:13px;padding:7px 10px 7px 28px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);outline:none;font-family:var(--font)}
    #home-btn{margin:2px 8px 4px;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
    #home-btn:hover,#home-btn.active{background:rgba(255,255,255,.12)}
    #block-list{flex:1;overflow-y:auto;padding:0 8px}
    .list-label{font-size:10px;color:var(--text3);padding:8px 8px 3px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
    .block-row{display:flex;align-items:center;gap:5px;padding:7px 9px;border-radius:8px;cursor:pointer;margin-bottom:1px;font-size:13px;transition:background .1s}
    .block-row:hover{background:rgba(255,255,255,.07)}
    .block-row.active{background:rgba(255,255,255,.15);font-weight:500}
    .block-row.dragover{background:var(--surface2)}
    .drag-handle{font-size:11px;color:var(--text3);cursor:grab;letter-spacing:-1px;flex-shrink:0}
    .block-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .block-count{font-size:11px;color:var(--text3);flex-shrink:0}
    .pin-btn,.del-btn{background:none;border:none;cursor:pointer;font-size:11px;flex-shrink:0;opacity:.25;color:var(--text);transition:opacity .15s}
    .pin-btn.pinned,.block-row:hover .pin-btn,.block-row:hover .del-btn{opacity:1}
    .del-btn{font-size:15px}
    .block-name-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font);min-width:0}
    #add-block-btn{margin:10px 10px 4px;padding:8px;font-size:13px;background:none;border:1px dashed rgba(255,255,255,.2);border-radius:8px;cursor:pointer;color:var(--text2);font-family:var(--font);width:calc(100% - 20px);transition:border-color .15s,color .15s}
    #add-block-btn:hover{border-color:rgba(255,255,255,.5);color:var(--text)}
    #export-btn{margin:0 10px 10px;padding:8px;font-size:13px;background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;cursor:pointer;color:var(--text2);font-family:var(--font);width:calc(100% - 20px);transition:border-color .15s,color .15s}
    #export-btn:hover{border-color:rgba(255,255,255,.4);color:var(--text)}
    /* Main */
    #main{flex:1;display:flex;flex-direction:column;min-width:0}
    #topbar{display:flex;align-items:center;gap:8px;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--sidebar);flex-shrink:0}
    #toggle-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:17px;padding:3px 5px;border-radius:6px}
    #topbar-title{font-size:15px;font-weight:500;flex:1;cursor:default}
    #topbar-hint{font-size:11px;font-weight:400;color:var(--text3);margin-left:10px}
    .topbar-btn{background:none;border:1px solid rgba(255,255,255,.15);border-radius:7px;color:var(--text2);cursor:pointer;font-size:11px;padding:4px 10px;font-family:var(--font);white-space:nowrap;transition:border-color .15s,color .15s,background .15s;flex-shrink:0}
    .topbar-btn:hover{border-color:rgba(255,255,255,.4);color:var(--text)}
    .topbar-btn.active{background:rgba(255,255,255,.15);color:var(--text);border-color:rgba(255,255,255,.4)}
    #sync-status{font-size:11px;color:var(--text3);padding:5px 18px;text-align:right;flex-shrink:0;background:var(--sidebar);border-bottom:1px solid var(--border)}
    /* Home */
    #home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:32px;overflow-y:auto}
    #home-title{font-size:36px;font-weight:600;letter-spacing:-.5px;border:none;background:transparent;color:var(--text);text-align:center;font-family:var(--font);outline:none;border-bottom:2px solid transparent}
    #home-title:focus{border-bottom-color:rgba(255,255,255,.3)}
    #home-sub{font-size:14px;color:var(--text2);margin-top:8px;text-align:center}
    #block-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;width:100%;max-width:480px}
    .block-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:background .15s,transform .1s}
    .block-card:hover{background:var(--surface2);transform:translateY(-2px)}
    .block-card-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
    .block-card-count{font-size:11px;color:var(--text3)}
    .block-card-add{background:transparent;border:1px dashed rgba(255,255,255,.2);border-radius:12px;padding:18px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);transition:border-color .15s}
    .block-card-add:hover{border-color:rgba(255,255,255,.5);color:var(--text)}
    /* Chat */
    #chat{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
    #chat-empty{color:var(--text3);font-size:14px;margin:auto;text-align:center;line-height:2}
    .entry{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
    .bubble{max-width:75%;background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 4px 14px;padding:11px 15px 8px;font-size:14px;line-height:1.7;word-break:break-word}
    .bubble b{font-weight:700}.bubble i{font-style:italic}.bubble u{text-decoration:underline}
    .bubble-actions{display:flex;gap:10px;margin-top:6px;justify-content:flex-end}
    .bubble-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3)}
    .entry-ts{font-size:11px;color:var(--text3);padding-right:4px}
    .edit-box{width:75%;display:flex;flex-direction:column;gap:7px}
    .edit-textarea{width:100%;font-size:14px;padding:11px 15px;border-radius:14px 14px 4px 14px;border:1px solid rgba(255,255,255,.3);background:var(--surface);color:var(--text);outline:none;resize:vertical;line-height:1.6;font-family:var(--font)}
    .edit-actions{display:flex;gap:6px;justify-content:flex-end}
    .btn-cancel{font-size:12px;padding:4px 14px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font)}
    .btn-save{font-size:12px;padding:4px 14px;border-radius:6px;border:none;background:var(--accent);color:var(--acc-text);cursor:pointer;font-family:var(--font);font-weight:500}
    /* Input */
    #input-area{padding:10px 18px 14px;border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;flex-shrink:0;background:var(--sidebar)}
    #input-col{flex:1;display:flex;flex-direction:column;gap:5px}
    .fmt-toolbar{display:flex;gap:4px;flex-wrap:wrap}
    .fmt-btn,.img-upload-btn,.file-upload-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;font-size:12px;padding:2px 9px;font-family:var(--font);line-height:1.6}
    .fmt-btn:hover,.img-upload-btn:hover,.file-upload-btn:hover{background:rgba(255,255,255,.18);color:var(--text)}
    #img-input,#file-input{display:none}
    #note-input{font-size:14px;padding:10px 15px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);outline:none;line-height:1.6;font-family:var(--font);width:100%;min-height:44px;max-height:200px;overflow-y:auto;word-break:break-word}
    #note-input:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
    #send-btn{background:var(--accent);color:var(--acc-text);border:none;border-radius:10px;padding:0 18px;font-size:20px;cursor:pointer;flex-shrink:0;font-weight:700;height:44px}
    #send-btn:hover{background:#f0f0f0}
    .img-preview-wrap{display:flex;flex-wrap:wrap;gap:6px}
    .img-preview{position:relative;display:inline-block}
    .img-preview img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
    .img-preview-del{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
    .file-preview{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text2)}
    .file-preview-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-preview-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;flex-shrink:0}
    .bubble-img{max-width:260px;max-height:200px;border-radius:8px;margin-top:6px;cursor:pointer;border:1px solid var(--border);display:block}
    .bubble-file{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-top:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .15s}
    .bubble-file:hover{background:rgba(255,255,255,.12);color:var(--text)}
    .bubble-file-icon{font-size:18px;flex-shrink:0}
    .bubble-file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;cursor:zoom-out}
    .img-lightbox img{max-width:90vw;max-height:90vh;border-radius:10px}
    /* Tags */
    .tag{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:1px 9px;font-size:11px;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;margin:2px 2px 0 0}
    .tag:hover,.tag.active{background:rgba(255,255,255,.25);color:var(--text)}
    .tag-input-wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid var(--border);position:relative;margin-top:4px}
    .tag-chip{background:var(--surface2);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
    .tag-chip-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;padding:0}
    #tag-text{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:var(--font);min-width:80px;flex:1}
    #tag-suggestions{position:absolute;bottom:calc(100% + 4px);left:0;background:#0d4e47;border:1px solid rgba(255,255,255,.2);border-radius:8px;overflow:hidden;z-index:100;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
    .tag-sug-item{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text2);transition:background .1s}
    .tag-sug-item:hover,.tag-sug-item.selected{background:rgba(255,255,255,.12);color:var(--text)}
    /* Search */
    .result-card{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:var(--surface);border:1px solid var(--border)}
    .result-block{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
    .result-text{font-size:13px;line-height:1.5;word-break:break-word}
    mark{background:rgba(255,255,255,.25);color:#fff;border-radius:2px;padding:0 2px}
    /* ── Todo ── */
    #todo-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
    #todo-view{flex:1;overflow-y:auto;padding:24px 28px;cursor:text;min-height:0}
    #todo-view:empty::before{content:"Clique para começar a escrever...";color:var(--text3);font-size:14px}
    #todo-edit{flex:1;overflow-y:auto;padding:24px 28px;resize:none;border:none;outline:none;background:transparent;color:var(--text);font-family:var(--font);font-size:14px;line-height:1.9;display:none}
    #todo-hint{padding:4px 28px 10px;font-size:11px;color:var(--text3);flex-shrink:0}
    /* node rows */
    .tn{display:flex;align-items:baseline;gap:5px;padding:1px 0;line-height:1.8}
    .tn-arrow{cursor:pointer;font-size:11px;color:var(--text3);user-select:none;flex-shrink:0;width:14px;text-align:center;transition:color .1s}
    .tn-arrow:hover{color:var(--accent)}
    .tn-text{flex:1}
    .tn.d3 .tn-text{font-size:22px;font-weight:700;color:#7ee8e2}
    .tn.d2 .tn-text{font-size:17px;font-weight:500;color:var(--accent)}
    .tn.d1 .tn-text{font-size:14px;color:var(--text)}
    .tn.d0 .tn-text{font-size:12px;color:var(--text2)}
    .tn-children{padding-left:20px}
    .tn-children.hidden{display:none}
    @media(max-width:600px){#sidebar{width:200px}#sidebar.mini{width:40px}#chat{padding:16px}#input-area{padding:10px 12px 14px}#home{padding:24px 16px}#home-title{font-size:26px}}
  </style>
</head>
<body>

<div id="lock-screen">
  <div id="lock-icon">🔒</div>
  <div id="lock-title">Segundo Cérebro</div>
  <div id="lock-subtitle">Digite seu PIN para entrar</div>
  <div id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div><div class="pin-dot" id="d4"></div><div class="pin-dot" id="d5"></div>
  </div>
  <div id="pin-error"></div>
  <div id="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key del" onclick="pinClear()">⌫</button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key" style="opacity:0;pointer-events:none"></button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="brand">
      <div id="brand-icon">M</div>
      <div class="brand-name" id="brand-name-el">Meu Espaço</div>
    </div>
    <div id="resize-handle"></div>
    <div id="search-wrap"><input id="search" placeholder="Buscar em tudo..." oninput="onSearch(this.value)"/></div>
    <div id="home-btn" onclick="goHome()">🏠 <span id="home-label">Início</span></div>
    <div id="block-list"></div>
    <button id="add-block-btn" onclick="addBlock()">+ Novo bloco de notas</button>
    <button id="export-btn" onclick="exportTxt()">↓ Exportar TXT completo</button>
  </div>
  <div id="main">
    <div id="topbar">
      <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
      <div id="topbar-title">Início<span id="topbar-hint"></span></div>
      <button id="export-block-btn" class="topbar-btn" style="display:none" onclick="exportBlockTxt()">↓ Exportar bloco</button>
      <button id="todo-toggle-btn" class="topbar-btn" style="display:none" onclick="toggleTodoMode()">☑ To-do</button>
    </div>
    <div id="sync-status">Conectando...</div>
    <div id="content"></div>
  </div>
</div>

<script>
// PIN — must be global (not module) so onclick works
const PIN_CODE = "132516";
let pinEntry = "";
function pinPress(d) {
  if (pinEntry.length >= 6) return;
  pinEntry += d;
  for (let i = 0; i < 6; i++) document.getElementById("d"+i).classList.toggle("filled", i < pinEntry.length);
  if (pinEntry.length === 6) setTimeout(checkPin, 150);
}
function pinClear() {
  pinEntry = "";
  for (let i = 0; i < 6; i++) document.getElementById("d"+i).classList.remove("filled");
  document.getElementById("pin-error").textContent = "";
}
function checkPin() {
  if (pinEntry === PIN_CODE) {
    document.getElementById("lock-screen").classList.add("hidden");
    sessionStorage.setItem("unlocked","1");
    startApp();
  } else {
    pinEntry = "";
    for (let i = 0; i < 6; i++) document.getElementById("d"+i).classList.remove("filled");
    document.getElementById("pin-error").textContent = "PIN incorreto. Tente novamente.";
    const dots = document.getElementById("pin-dots");
    dots.style.animation = "none"; dots.offsetHeight; dots.style.animation = "shake .4s ease";
  }
}
document.addEventListener("keydown", ev => {
  if (document.getElementById("lock-screen").classList.contains("hidden")) return;
  if (ev.key >= "0" && ev.key <= "9") pinPress(ev.key);
  if (ev.key === "Backspace") pinClear();
});
if (sessionStorage.getItem("unlocked") === "1") {
  document.getElementById("lock-screen").classList.add("hidden");
  document.addEventListener("DOMContentLoaded", startApp);
} else {
  document.addEventListener("DOMContentLoaded", () => {});
}
</script>

function uid(){return Math.random().toString(36).slice(2,9);}
function sorted(){return[...state.blocks.filter(b=>b.pinned),...state.blocks.filter(b=>!b.pinned)];}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function hilite(text,q){if(!q)return escHtml(text);const i=text.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return escHtml(text);return escHtml(text.slice(0,i))+"<mark>"+escHtml(text.slice(i,i+q.length))+"</mark>"+escHtml(text.slice(i+q.length));}
function fileIcon(m){if(m==="application/pdf")return"📄";if(m.includes("word"))return"📝";if(m.includes("excel")||m.includes("spreadsheet"))return"📊";if(m.includes("powerpoint")||m.includes("presentation"))return"📑";if(m.includes("zip"))return"🗜";return"📎";}
function fileSize(b){if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB";}
function renderFmt(raw){return raw.split(/(<\/?(?:b|i|u)>)/g).map(p=>/^<\/?(?:b|i|u)>$/.test(p)?p:escHtml(p)).join("").replace(/\n/g,"<br>");}

window.startApp = async function() {
  const ms = await getDoc(metaRef);
  if (ms.exists()) state.title = ms.data().title||"Meu Espaço";
  else await setDoc(metaRef,{title:"Meu Espaço"});
  const bq = query(blocksCol,orderBy("order"));
  onSnapshot(bq, async snap=>{
    if(snap.empty){for(let i=0;i<3;i++)await addDoc(blocksCol,{name:["Ideias gerais","Clientes","Projetos"][i],pinned:false,order:i});return;}
    state.blocks = snap.docs.map(d=>({id:d.id,...d.data(),entries:state.blocks.find(b=>b.id===d.id)?.entries||[]}));
    state.blocks.forEach(b=>{if(!unsubEntries[b.id])subEntries(b.id);});
    Object.keys(unsubEntries).forEach(id=>{if(!state.blocks.find(b=>b.id===id)){unsubEntries[id]();delete unsubEntries[id];}});
    setStatus("Sincronizado ✓"); render();
  });
};

function subEntries(blockId){
  const eq=query(collection(db,"blocks",blockId,"entries"),orderBy("createdAt"));
  unsubEntries[blockId]=onSnapshot(eq,snap=>{
    const b=state.blocks.find(x=>x.id===blockId);if(!b)return;
    b.entries=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.activeId===blockId)renderContent();
    renderSidebar();
  });
}

function renderSidebar(){
  const list=document.getElementById("block-list");
  document.getElementById("brand-name-el").textContent=state.title;
  document.getElementById("home-btn").classList.toggle("active",!state.activeId);
  if(searchQuery.trim().length>1){
    const q=searchQuery.toLowerCase();
    const results=state.blocks.flatMap(b=>(b.entries||[]).filter(e=>typeof e.text==="string"&&e.text.toLowerCase().includes(q)).map(e=>({blockName:b.name,blockId:b.id,entry:e})));
    list.innerHTML=`<div class="list-label">${results.length} resultado${results.length!==1?"s":""}</div>`;
    if(!results.length)list.innerHTML+=`<div style="font-size:13px;color:var(--text2);padding:8px 6px">Nenhum resultado.</div>`;
    else results.forEach(({blockName,blockId,entry})=>{

      d.innerHTML=`<div class="result-block">${escHtml(blockName)}</div><div class="result-text">${hilite(entry.text.slice(0,80)+(entry.text.length>80?"…":""),searchQuery)}</div>`;

      list.appendChild(d);
    });
    return;
  }
  list.innerHTML="";
  const bs=sorted();const hasPinned=bs.some(b=>b.pinned);let sp=false,sb=false;
  bs.forEach(b=>{
    if(b.pinned&&!sp){list.insertAdjacentHTML("beforeend",`<div class="list-label">Fixados</div>`);sp=true;}
    if(!b.pinned&&hasPinned&&!sb){list.insertAdjacentHTML("beforeend",`<div class="list-label">Blocos</div>`);sb=true;}
    const row=document.createElement("div");
    row.className="block-row"+(state.activeId===b.id?" active":"");
    row.dataset.id=b.id; row.draggable=!b.pinned;
    const todoIcon = b.todo ? " ☑" : "";
    row.innerHTML=`${!b.pinned?`<span class="drag-handle">⠿</span>`:""}<span class="block-name" ondblclick="renameBlock('${b.id}',event)">${escHtml(b.name)}${todoIcon}</span><span class="block-count">${b.todo?"":(b.entries||[]).length}</span><button class="pin-btn ${b.pinned?"pinned":""}" onclick="togglePin('${b.id}',event)">📌</button>${state.blocks.length>1?`<button class="del-btn" onclick="deleteBlock('${b.id}',event)">×</button>`:""}`;
    row.addEventListener("click",()=>{clickTimer=setTimeout(()=>{state.activeId=b.id;render();},220);});
    if(!b.pinned){
      row.addEventListener("dragstart",()=>{dragSrcId=b.id;setTimeout(()=>row.style.opacity=".3",0);});
      row.addEventListener("dragend",()=>{row.style.opacity="1";dragSrcId=null;});
      row.addEventListener("dragover",e=>{e.preventDefault();row.classList.add("dragover");});
      row.addEventListener("dragleave",()=>row.classList.remove("dragover"));
      row.addEventListener("drop",async()=>{
        row.classList.remove("dragover");if(!dragSrcId||dragSrcId===b.id)return;
        const src=state.blocks.find(x=>x.id===dragSrcId);if(src?.pinned)return;
        const si=state.blocks.findIndex(x=>x.id===dragSrcId),ti=state.blocks.findIndex(x=>x.id===b.id);
        state.blocks.splice(si,1);state.blocks.splice(ti,0,src);
        for(let i=0;i<state.blocks.length;i++)await updateDoc(doc(db,"blocks",state.blocks[i].id),{order:i});
        renderSidebar();

function autoReplaceDiv(el){
  const sel=window.getSelection();if(!sel.rangeCount)return;
  const range=sel.getRangeAt(0),node=range.startContainer;if(node.nodeType!==3)return;
  const txt=node.textContent,pos=range.startOffset,before=txt.slice(0,pos);
  const bm=before.match(/(^|\n)(- )$/);
  if(bm){const st=before.lastIndexOf("- ");node.textContent=txt.slice(0,st)+"• "+txt.slice(pos);const r=document.createRange();r.setStart(node,st+2);r.collapse(true);sel.removeAllRanges();sel.addRange(r);return;}
  for(const[rx,sym]of[[/<->/,"↔"],[/<=>/,"⇔"],[/-->/,"➞"],[/<--/,"←"],[/=>/,"➾"],[/->/,"➞"]]){
    const m=before.match(new RegExp(rx.source+"$"));
    if(m){const st=pos-m[0].length;node.textContent=txt.slice(0,st)+sym+txt.slice(pos);const r=document.createRange();r.setStart(node,st+sym.length);r.collapse(true);sel.removeAllRanges();sel.addRange(r);return;}
  }
}

  const q=val.replace(/^#/,"").toLowerCase().trim();
  if(!q){hideSuggestions();return;}
  const all=getAllTags().filter(t=>t.startsWith(q)&&!pendingTags.includes(t));
  if(!all.length){hideSuggestions();return;}
  if(!box){box=document.createElement("div");box.id="tag-suggestions";document.getElementById("tag-input-wrap").appendChild(box);}
  sugIndex=-1;
  box.innerHTML=all.map(t=>`<div class="tag-sug-item" data-tag="${escHtml(t)}">#${escHtml(t)}</div>`).join("");
  box.querySelectorAll(".tag-sug-item").forEach(el=>el.onmousedown=ev=>{ev.preventDefault();pickSug(el.dataset.tag);});
}
function hideSuggestions(){const b=document.getElementById("tag-suggestions");if(b)b.remove();sugIndex=-1;}
function pickSug(tag){if(tag&&!pendingTags.includes(tag))pendingTags.push(tag);const ti=document.getElementById("tag-text");if(ti)ti.value="";renderTagChips();hideSuggestions();}
function initTagInput(){
  const ti=document.getElementById("tag-text");if(!ti)return;
  ti.oninput=()=>showSuggestions(ti.value);
  ti.onkeydown=ev=>{
    const box=document.getElementById("tag-suggestions"),items=box?box.querySelectorAll(".tag-sug-item"):[];
    if(ev.key==="ArrowDown"){ev.preventDefault();sugIndex=Math.min(sugIndex+1,items.length-1);items.forEach((el,i)=>el.classList.toggle("selected",i===sugIndex));return;}
    if(ev.key==="ArrowUp"){ev.preventDefault();sugIndex=Math.max(sugIndex-1,0);items.forEach((el,i)=>el.classList.toggle("selected",i===sugIndex));return;}
    if(ev.key==="Enter"||ev.key===","){ev.preventDefault();ev.stopPropagation();if(sugIndex>=0&&items[sugIndex]){pickSug(items[sugIndex].dataset.tag);return;}const v=ti.value.trim().replace(/^#/,"").toLowerCase();if(v&&!pendingTags.includes(v)){pendingTags.push(v);renderTagChips();}ti.value="";hideSuggestions();return;}
    if(ev.key==="Escape"){hideSuggestions();return;}
    ev.stopPropagation();
  };
  ti.onblur=()=>setTimeout(hideSuggestions,150);
}

window.openTagFilter=function(tag){activeTagFilter=tag;state.activeId="__tag__";renderTopbar();renderContent();};
function renderTagView(c){
  const all=state.blocks.flatMap(b=>(b.entries||[]).filter(e=>(e.tags||[]).includes(activeTagFilter)).map(e=>({...e,blockName:b.name,blockId:b.id}))).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  const hdr=document.createElement("div");hdr.style.cssText="padding:16px 28px 8px;font-size:13px;color:var(--text2);flex-shrink:0";
  hdr.innerHTML=`<span class="tag active">#${escHtml(activeTagFilter)}</span> <span style="margin-left:8px">${all.length} nota${all.length!==1?"s":""}</span>`;c.appendChild(hdr);
  const chat=document.createElement("div");chat.id="chat";
  if(!all.length)chat.innerHTML=`<div id="chat-empty">Nenhuma nota com a tag <b>#${escHtml(activeTagFilter)}</b>.</div>`;
  else all.forEach(e=>{const b=state.blocks.find(x=>x.id===e.blockId);if(b)renderEntry(chat,b,e,true);});
  c.appendChild(chat);
}

// ── TODO MODE ──
window.toggleTodoMode=async function(){
  const b=state.blocks.find(x=>x.id===state.activeId);if(!b)return;
  await updateDoc(doc(db,"blocks",state.activeId),{todo:!b.todo});
};

function buildTree(nodes){
  const root=[],stack=[];
  for(const n of nodes){
    const node={...n,children:[]};
    while(stack.length&&stack[stack.length-1].depth>=node.depth)stack.pop();
    if(!stack.length)root.push(node);else stack[stack.length-1].children.push(node);
    stack.push(node);
  }
  return root;
}

function renderTodo(c,b){
  const area=document.createElement("div");area.id="todo-area";
  const nodes=b.todoNodes||[];
  const tree=buildTree(nodes);

  function renderTree(list,container){
    list.forEach(node=>{
      const wrap=document.createElement("div");
      wrap.dataset.id=node.id;
      wrap.className="todo-node l"+node.depth+(node.collapsed?" collapsed":"");
      const hasKids=node.children&&node.children.length>0;
      wrap.innerHTML=`
        <button class="todo-toggle" onclick="todoCollapse('${node.id}')">${hasKids?(node.collapsed?"▶":"▼"):"·"}</button>
        <input type="checkbox" class="todo-cb" ${node.done?"checked":""} onchange="todoDone('${node.id}',this.checked)"/>
        <div class="todo-text${node.done?" done":""}" contenteditable="true"
          onblur="todoSave('${node.id}',this)"
          onkeydown="todoKey(event,'${node.id}')">${escHtml(node.text||"")}</div>
        <div class="todo-actions">
          <button class="todo-act-btn" onclick="todoIndent('${node.id}',1)" title="Indentar">→</button>
          <button class="todo-act-btn" onclick="todoIndent('${node.id}',-1)" title="Desindentar">←</button>
          <button class="todo-act-btn" onclick="todoAddChild('${node.id}')">+filho</button>
          <button class="todo-act-btn" onclick="todoDelete('${node.id}')">✕</button>
        </div>`;
      if(hasKids){
        const kids=document.createElement("div");kids.className="todo-children";
        renderTree(node.children,kids);wrap.appendChild(kids);
      }
      container.appendChild(wrap);
    });
  }
  renderTree(tree,area);
  const addBtn=document.createElement("button");
  addBtn.className="todo-add-root";addBtn.textContent="+ Adicionar item";
  addBtn.onclick=()=>todoAddRoot();
  area.appendChild(addBtn);
  c.appendChild(area);
}

function getTodoNodes(){return state.blocks.find(x=>x.id===state.activeId)?.todoNodes||[];}
async function saveTodoNodes(nodes){await updateDoc(doc(db,"blocks",state.activeId),{todoNodes:nodes});}

window.todoDone=async function(id,done){await saveTodoNodes(getTodoNodes().map(n=>n.id===id?{...n,done}:n));};
window.todoCollapse=async function(id){await saveTodoNodes(getTodoNodes().map(n=>n.id===id?{...n,collapsed:!n.collapsed}:n));};
window.todoSave=async function(id,el){
  const txt=el.innerText.trim();
  // Check syntax hint: --- -- - at start
  const m=txt.match(/^(---|--)(?:\s|$)/)||txt.match(/^(-)\s/);
  if(m){
    const prefix=m[1],depth=prefix==="---"?3:prefix==="--"?2:1;
    const clean=txt.replace(/^---?\-?\s*/,"");
    el.innerText=clean;
    await saveTodoNodes(getTodoNodes().map(n=>n.id===id?{...n,text:clean,depth}:n));
    return;
  }
  await saveTodoNodes(getTodoNodes().map(n=>n.id===id?{...n,text:txt}:n));
};
window.todoKey=function(ev,id){
  if(ev.key==="Escape"){ev.target.blur();return;}
  if(ev.key==="Enter"&&!ev.shiftKey){
    ev.preventDefault();
    const nodes=getTodoNodes();const idx=nodes.findIndex(n=>n.id===id);const cur=nodes[idx];
    const newNode={id:uid(),text:"",depth:cur.depth,done:false,collapsed:false};
    nodes.splice(idx+1,0,newNode);
    saveTodoNodes(nodes).then(()=>setTimeout(()=>{
      const el=document.querySelector(`.todo-node[data-id="${newNode.id}"] .todo-text`);
      if(el)el.focus();
    },250));
  }
};
window.todoIndent=async function(id,dir){
  await saveTodoNodes(getTodoNodes().map(n=>n.id===id?{...n,depth:Math.min(3,Math.max(0,n.depth+dir))}:n));
};
window.todoDelete=async function(id){
  if(!confirm("Deletar este item?"))return;
  await saveTodoNodes(getTodoNodes().filter(n=>n.id!==id));
};
window.todoAddChild=async function(parentId){
  const nodes=getTodoNodes();const idx=nodes.findIndex(n=>n.id===parentId);
  const newNode={id:uid(),text:"",depth:Math.min(3,nodes[idx].depth+1),done:false,collapsed:false};
  nodes.splice(idx+1,0,newNode);
  await saveTodoNodes(nodes);
  setTimeout(()=>{const el=document.querySelector(`.todo-node[data-id="${newNode.id}"] .todo-text`);if(el)el.focus();},250);
};
window.todoAddRoot=async function(){
  const nodes=getTodoNodes();
  const newNode={id:uid(),text:"",depth:0,done:false,collapsed:false};
  nodes.push(newNode);
  await saveTodoNodes(nodes);
  setTimeout(()=>{const el=document.querySelector(`.todo-node[data-id="${newNode.id}"] .todo-text`);if(el)el.focus();},250);
};

// ── Export ──
async function buildExport(entries,slug){
  const hasAtt=entries.some(e=>(e.images||[]).length||(e.files||[]).length);
  const lines=[],att=[];
  entries.forEach((e,ei)=>{
    const tags=(e.tags||[]).map(t=>"#"+t).join(" ");
    const txt=(e.text||"").replace(/<\/?[biuBIU]>/g,"").replace(/<br\s*\/?>/gi,"\n").replace(/<[^>]+>/g,"");
    lines.push(`\n[${e.ts||""}${tags?" "+tags:""}]`);if(txt)lines.push(txt);
    (e.images||[]).forEach((img,ii)=>{const ext=img.mime.split("/")[1]||"jpg";const fn=`anexos/${slug}-nota${ei+1}-img${ii+1}.${ext}`;lines.push(`[imagem: ${fn}]`);att.push({fn,b64:img.base64.split(",")[1]});});
    (e.files||[]).forEach((f,fi)=>{const fn=`anexos/${slug}-nota${ei+1}-arq${fi+1}-${f.name}`;lines.push(`[arquivo: ${fn}]`);att.push({fn,b64:f.base64.split(",")[1]});});
  });
  return{lines,att,hasAtt};
}
window.exportBlockTxt=async function(){
  const b=state.blocks.find(x=>x.id===state.activeId);if(!b)return;
  const slug=b.name.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
  const date=new Date().toISOString().slice(0,10);
  const header=[`SEGUNDO CÉREBRO — ${state.title}`,`Bloco: ${b.name}`,`Exportado em: ${new Date().toLocaleString("pt-BR")}`,"=".repeat(50)];
  const{lines,att,hasAtt}=await buildExport(b.entries||[],slug);
  const all=[...header,...lines];
  if(hasAtt){const zip=new JSZip();zip.file(`${slug}.txt`,all.join("\n"));att.forEach(f=>zip.file(f.fn,f.b64,{base64:true}));const blob=await zip.generateAsync({type:"blob"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${slug}-${date}.zip`;a.click();}
  else{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([all.join("\n")],{type:"text/plain;charset=utf-8"}));a.download=`${slug}-${date}.txt`;a.click();}
};
window.exportTxt=async function(){
  const date=new Date().toISOString().slice(0,10);
  const header=[`SEGUNDO CÉREBRO — ${state.title}`,`Exportado em: ${new Date().toLocaleString("pt-BR")}`,"=".repeat(50)];
  const allLines=[...header];const allAtt=[];let hasAtt=false;
  for(const b of sorted()){
    const slug=b.name.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
    allLines.push(`\n## ${b.name.toUpperCase()}`);allLines.push("-".repeat(30));
    if(!(b.entries||[]).length){allLines.push("(sem notas)");}
    else{const{lines,att,hasAtt:ha}=await buildExport(b.entries,slug);allLines.push(...lines);allAtt.push(...att);if(ha)hasAtt=true;}
  }
  if(hasAtt){const zip=new JSZip();zip.file("segundo-cerebro.txt",allLines.join("\n"));allAtt.forEach(f=>zip.file(f.fn,f.b64,{base64:true}));const blob=await zip.generateAsync({type:"blob"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`segundo-cerebro-${date}.zip`;a.click();}
  else{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([allLines.join("\n")],{type:"text/plain;charset=utf-8"}));a.download=`segundo-cerebro-${date}.txt`;a.click();}
};

// ── Resize sidebar ──
(function(){
  const handle=document.getElementById("resize-handle"),sidebar=document.getElementById("sidebar");
  let dragging=false,startX=0,startW=0;
  handle.addEventListener("mousedown",e=>{if(sidebarMini)return;dragging=true;startX=e.clientX;startW=sidebar.offsetWidth;handle.classList.add("dragging");document.body.style.cssText="cursor:col-resize;user-select:none";});
  document.addEventListener("mousemove",e=>{if(!dragging)return;sidebar.style.width=Math.min(480,Math.max(48,startW+(e.clientX-startX)))+"px";});
  document.addEventListener("mouseup",()=>{if(!dragging)return;dragging=false;handle.classList.remove("dragging");document.body.style.cssText="";});
})();
